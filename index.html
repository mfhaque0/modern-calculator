<!DOCTYPE html>
<html>
<head>
<title>Modern Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="app">

<h1>Modern Calculator</h1>

<div class="calculator">

<button class="mode-btn" onclick="toggleMode()">☀️</button>

<input type="text" id="display" disabled>

<div class="buttons">

<button onclick="clearDisplay()" class="special">C</button>
<button onclick="backspace()" class="special">⌫</button>
<button onclick="append('%')" class="operator">%</button>
<button onclick="append('/')" class="operator">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('*')" class="operator">×</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('-')" class="operator">−</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('+')" class="operator">+</button>

<button onclick="append('0')" class="zero">0</button>
<button onclick="append('.')">.</button>
<button onclick="calculate()" class="equal">=</button>

</div>

</div>

<div class="history">
<h3>History</h3>
<ul id="historyList"></ul>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
