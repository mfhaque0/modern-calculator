<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calculator | Sumaiya Akhtar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="dark">

    <div class="app">
        <div class="calculator">
            <div class="top-bar">
                <span class="brand">PREMIUM CALC</span>
                <button class="mode-btn" onclick="toggleMode()">☀️</button>
            </div>
            
            <input type="text" id="display" placeholder="0" disabled>

            <div class="buttons">
                <button onclick="clearDisplay()" class="special">C</button>
                <button onclick="backspace()" class="special">⌫</button>
                <button onclick="append('%')" class="operator">%</button>
                <button onclick="append('/')" class="operator">÷</button>

                <button onclick="append('7')">7</button>
                <button onclick="append('8')">8</button>
                <button onclick="append('9')">9</button>
                <button onclick="append('*')" class="operator">×</button>

                <button onclick="append('4')">4</button>
                <button onclick="append('5')">5</button>
                <button onclick="append('6')">6</button>
                <button onclick="append('-')" class="operator">−</button>

                <button onclick="append('1')">1</button>
                <button onclick="append('2')">2</button>
                <button onclick="append('3')">3</button>
                <button onclick="append('+')" class="operator">+</button>

                <button onclick="append('0')" class="zero">0</button>
                <button onclick="append('.')">.</button>
                <button onclick="calculate()" class="equal">=</button>
            </div>

            <div class="history">
                <ul id="historyList"></ul>
            </div>
        </div>

        <footer class="footer">
            Developed with ❤️ by <span>Md Faizanul Haque</span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
